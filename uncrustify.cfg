# Base indentation
indent_columns                  = 2
indent_with_tabs                = 0

# Switch/case formatting
indent_switch_case              = 2
indent_switch_break_with_case   = true
mod_case_brace                  = remove
mod_add_long_switch_closebrace_comment = 1

# Keep brace style close to current project style
nl_fdef_brace                   = remove
nl_if_brace                     = remove
nl_else_brace                   = remove
nl_while_brace                  = remove
nl_for_brace                    = remove
nl_switch_brace                 = remove
nl_brace_else                   = remove
nl_brace_while                  = remove
sp_brace_else                   = force
sp_else_brace                   = force
sp_brace_close_while            = force

# Preserve include ordering from source files
mod_sort_include                = false
